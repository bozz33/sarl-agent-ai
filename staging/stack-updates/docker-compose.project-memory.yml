services:
  project-memory-mcp:
    image: sarl/project-memory-mcp:0.1.1
    container_name: sarl-project-memory-mcp
    restart: unless-stopped
    env_file:
      - .secrets/project-memory.env
    volumes:
      - /var/run/postgresql:/var/run/postgresql
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; socket.create_connection(('127.0.0.1', 8000), 3).close()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
