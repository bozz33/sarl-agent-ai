services:
  hermes-agent:
    image: sarl/hermes-agent:0.17.0-audit20260629
    build:
      context: ./deploy/hermes-agent
    container_name: sarl-hermes-agent
    restart: unless-stopped
    command: ["gateway", "run"]
    env_file:
      - .secrets/hermes-api.env
      - .secrets/providers.env
      - .secrets/telegram.env
    environment:
      HERMES_UID: "10010"
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
      HERMES_DASHBOARD_INSECURE: "true"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      DOCKER_HOST: unix:///opt/sandbox-shared/docker.sock
      TERMINAL_SANDBOX_DIR: /opt/sandbox-shared
    volumes:
      - hermes-agent-data:/opt/data
      - sandbox-shared:/opt/sandbox-shared
      - ./projects:/workspace
      - ./runtime-observability:/opt/sarl-observability:ro
      - ./skills/custom:/opt/custom-skills:ro
      - ./hooks:/opt/sarl-hooks:ro
      - ./reports:/opt/sarl-reports:ro
      - ./scripts/sync-telegram-work.py:/opt/sarl-maintenance/sync-telegram-work.py:ro
      - ./scripts/apply-knowledge-validation.py:/opt/sarl-maintenance/apply-knowledge-validation.py:ro
      - ./scripts/personal-assistant-digest.py:/opt/sarl-maintenance/personal-assistant-digest.py:ro
      - ./scripts/email-prepare-draft.py:/opt/sarl-maintenance/email-prepare-draft.py:ro
      - ./scripts/trading-daily-digest.py:/opt/data/scripts/trading-daily-digest.py:ro
      - ./scripts/trading-weekly-review.py:/opt/data/scripts/trading-weekly-review.py:ro
      - ./scripts/trading-research-loop.py:/opt/data/scripts/trading-research-loop.py:ro
      - ./.secrets/ssh:/opt/hermes-ssh:ro
    networks:
      - default
      - sandbox-control
    ports:
      - "127.0.0.1:8642:8642"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/health && curl -fsS http://localhost:9119/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 900s

  hermes-workspace:
    image: sarl/hermes-workspace:d04e1f3-sarl13-no-global-sse
    container_name: sarl-hermes-workspace
    restart: unless-stopped
    depends_on:
      hermes-agent:
        condition: service_healthy
    env_file:
      - .secrets/workspace.env
    environment:
      HERMES_HOME: /home/workspace/.hermes
      HERMES_WORKSPACE_DIR: /workspace
      HERMES_API_URL: http://hermes-agent:8642
      HERMES_DASHBOARD_URL: http://hermes-agent:9119
    volumes:
      - hermes-agent-data:/home/workspace/.hermes
      - ./projects:/workspace
      - ./skills/custom:/opt/custom-skills:ro
      - ./swarm.yaml:/app/swarm.yaml
      - ./workspace-runtime:/app/.runtime
      - ./scripts/workspace-pty-janitor.py:/opt/sarl-maintenance/workspace-pty-janitor.py:ro
      - ./.secrets/ssh:/opt/hermes-ssh:ro
    ports:
      - "127.0.0.1:3000:3000"

  project-memory-mcp:
    image: sarl/project-memory-mcp:0.2.1
    build:
      context: ./services/project-memory-mcp
    container_name: sarl-project-memory-mcp
    restart: unless-stopped
    env_file:
      - .secrets/project-memory.env
      - .secrets/providers.env
    volumes:
      - /var/run/postgresql:/var/run/postgresql
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; socket.create_connection(('127.0.0.1', 8000), 3).close()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # Trading Demo Lab — secured NautilusTrader backtest adapter (MCP).
  # Backtest/simulation only; no live path. Reached by trading agents at
  # http://nautilus-runner-mcp:8200/mcp.
  nautilus-runner-mcp:
    image: sarl/nautilus-runner:0.12.1
    build:
      context: ./services/nautilus-runner
    container_name: sarl-nautilus-runner-mcp
    restart: unless-stopped
    environment:
      NAUTILUS_MCP_TRANSPORT: streamable-http
      NAUTILUS_MCP_HOST: 0.0.0.0
      NAUTILUS_MCP_PORT: "8200"
      NAUTILUS_ENVIRONMENT: BACKTEST
      TRADING_PAPER_ONLY: "true"
      TRADING_LIVE_ENABLED: "false"
      TRADING_KILL_SWITCH: "false"
      IBKR_HOST: ib-gateway
      IBKR_PORT: "4004"
    volumes:
      # Persist journal + historical data so candidate robustness accumulates
      # across runs/restarts (proven-over-many-attempts requires persistence).
      - nautilus-data:/srv/data
    expose:
      - "8200"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; socket.create_connection(('127.0.0.1', 8200), 3).close()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Phase 7 — IBKR PAPER gateway (headless, IBC auto-login). PAPER ONLY.
  # Use the DEDICATED paper username in .secrets/ibkr.env (no 2FA). The paper API
  # is published by socat on 0.0.0.0:4004; nautilus-runner reaches ib-gateway:4004.
  # TWS_ACCEPT_INCOMING=accept auto-accepts the API connection (no blocking popup).
  # No order is ever placed by the runner (read-only fetch + paper backtest only).
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: sarl-ib-gateway
    restart: unless-stopped
    env_file:
      - .secrets/ibkr.env
    environment:
      TRADING_MODE: paper
      TWS_ACCEPT_INCOMING: accept
      # Take over any existing session for this paper username (avoids the
      # "Existing session detected" dialog blocking login). Don't log into the
      # same paper account elsewhere while this runs.
      EXISTING_SESSION_DETECTED_ACTION: primary
    expose:
      - "4004"
    networks:
      - default
    profiles:
      - ibkr   # opt-in: `docker compose --profile ibkr up -d ib-gateway`

  sandbox-docker:
    image: docker:27-dind@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
    container_name: sarl-sandbox-docker
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command:
      - dockerd
      - --host=unix:///opt/sandbox-shared/docker.sock
      - --group=10000
      - --iptables=true
      - --icc=false
      - --userland-proxy=false
    volumes:
      - sandbox-docker-data:/var/lib/docker
      - sandbox-shared:/opt/sandbox-shared
    networks:
      - sandbox-control

networks:
  sandbox-control:
    internal: true

volumes:
  hermes-agent-data:
  sandbox-docker-data:
  sandbox-shared:
  nautilus-data:
