# Identité et contraintes du projet SARL-Agent-AI.
# Lu par tous les agents avant action (cf. sarl-agent-ai-operating-contract).

project_id: sarl-agent-ai
name: SARL-Agent-AI
description: >-
  Système agentique autonome supervisé : un orchestrateur central unique pilote
  des agents spécialisés via des skills de module, un Kanban durable, Swarm, une
  mémoire projet MCP, un governor indépendant et la validation humaine des
  actions critiques.
owner: Alain Francis
status: active

architecture:
  pattern: central-orchestrator
  orchestrator: sarl-orchestrator        # cerveau de décision, délègue, ne fait pas le travail
  router: sarl-router                    # pré-triage économique
  governor: sarl-governor                # vérifie, n'exécute pas
  stack_steward: sarl-stack-steward
  rule: >-
    Toute mission entre par l'orchestrateur, jamais directement par un agent
    spécialisé. Les domaines = skills de module + agents spécialisés, pas
    d'orchestrateurs de module permanents.

# Politique de fourniture des modèles.
models:
  orchestration: anthropic/claude-sonnet-4.6   # abonnement OAuth ; fallback openai-api/gpt-4.1 puis gemini
  serious: deepseek                            # code, refactor, diagnostic ops, audit, bureau d'études
  simple: gemini                               # pré-triage, résumé, doc, recherche légère, QA, community, support
  advanced_code: codex                         # uniquement via codex-builder
  exceptional: opus                            # manuel / validation humaine uniquement
  rules:
    - Ne jamais appeler Opus automatiquement.
    - Ne jamais utiliser Codex comme orchestrateur.
    - Ne jamais utiliser un modèle d'abonnement pour un simple résumé si Gemini suffit.
    - Si DeepSeek est épuisé/indisponible (quota, panne API), basculer en fallback
      sur Claude -> GPT -> Gemini (applique a tous les profils a modele DeepSeek).

# Mémoire projet (MCP project-memory).
memory:
  provider: mcp-project-memory
  project: sarl-agent-ai
  write_only:
    - décisions validées
    - incidents confirmés
    - procédures corrigées
    - règles métier durables
  never_write:
    - mots de passe, clés API, tokens, secrets
    - données personnelles inutiles

# Classification du risque et validation humaine.
risk:
  low: dispatch automatique contrôlé
  medium: validation conseillée
  high: validation humaine requise
  critical: validation humaine obligatoire, aucune exécution sans accord

# Actions interdites sans validation humaine explicite.
human_validation_required:
  - déploiement / mise en production
  - modification serveur, VPS ou cPanel
  - création / modification / suppression d'email professionnel
  - changement DNS, SSL, secrets ou base de données
  - suppression de fichiers
  - migration
  - merge sur main / branche protégée
  - toute action irréversible

# Sécurité.
security:
  hooks: /opt/sarl-hooks/sarl-policy-guard.py
  secrets: jamais lire/afficher/modifier sans autorisation explicite
  backups: backup / checkpoint / commit avant toute modification importante
